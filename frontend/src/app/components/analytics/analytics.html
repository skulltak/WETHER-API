<div class="analytics-container">
  <div class="metric-cards">
    <div class="metric-card">
      <h3 class="metric-title">PEAK CORRELATION</h3>
      <span class="value">88%</span>
      <p class="metric-desc">Volume increase per 10mm rain</p>
    </div>
    <div class="metric-card">
      <h3 class="metric-title">CURRENT FESTIVAL</h3>
      <span class="value">Operational Base</span>
      <p class="metric-desc">2026 Load Impact active</p>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h4>Live ML Call Load vs Rainfall</h4>
      <div class="chart-wrapper">
        <canvas id="loadChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h4>Seasonal & Festival Impact</h4>
      <div class="chart-wrapper">
        <canvas id="seasonalChart"></canvas>
      </div>
    </div>
  </div>
</div>
